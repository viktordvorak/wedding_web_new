<section class="rsvp-page">
    <form class="rsvp-page" [formGroup]="rsvpForm" (ngSubmit)="onSubmit()">
        <div class="top-logo">
            <img src="assets/images/rsvp.png" alt="Viktor & Barbora logo" />
        </div>
        <p class="rsvp-intro__text">
            Prosíme o potvrzení Vaší účasti<br />
            do <strong>31. června 2026</strong>.
        </p>

        <div class="form-field">
            <span class="form-field__label">
                <img src="assets/images/invitation-gold.png" alt="" class="field-icon" />
                Zúčastním se *
            </span>

            <div class="choice-row">
                <label class="choice-button">
                    <input type="radio" formControlName="attendance" value="yes" />
                    <span>Ano, přijdu</span>
                </label>

                <label class="choice-button">
                    <input type="radio" formControlName="attendance" value="no" />
                    <span>Bohužel nepřijdu</span>
                </label>
            </div>
        </div>

        <div class="form-grid">
            <label class="form-field">
                <span class="form-field__label">
                    <img src="assets/images/rsvp-person.png" alt="" class="field-icon" />
                    Jméno *
                </span>
                <input type="text" formControlName="firstName" placeholder="Vaše jméno" />
                <div class="field-error"
                    *ngIf="rsvpForm.controls.firstName.invalid && rsvpForm.controls.firstName.touched">
                    <span *ngIf="rsvpForm.controls.firstName.errors?.required">Jméno je povinné.</span>
                </div>
            </label>

            <label class="form-field">
                <span class="form-field__label">
                    <img src="assets/images/rsvp-person.png" alt="" class="field-icon" />
                    Příjmení *
                </span>
                <input type="text" formControlName="lastName" placeholder="Vaše příjmení" />
                <div class="field-error"
                    *ngIf="rsvpForm.controls.lastName.invalid && rsvpForm.controls.lastName.touched">
                    <span *ngIf="rsvpForm.controls.lastName.errors?.required">Příjmení je povinné.</span>
                </div>
            </label>
        </div>

        <div class="form-grid">
            <label class="form-field">
                <span class="form-field__label">
                    <img src="assets/images/rsvp-person.png" alt="" class="field-icon" />
                    Jméno doprovodu
                </span>
                <input type="text" formControlName="companionFirstName" placeholder="Jméno doprovodu" />
            </label>

            <label class="form-field">
                <span class="form-field__label">
                    <img src="assets/images/rsvp-person.png" alt="" class="field-icon" />
                    Příjmení doprovodu
                </span>
                <input type="text" formControlName="companionLastName" placeholder="Příjmení doprovodu" />
            </label>
        </div>

        <label class="form-field">
            <span class="form-field__label">
                <img src="assets/images/rsvp-kids.png" alt="" class="field-icon" />
                Počet dětí
            </span>

            <select formControlName="childrenCount">
                <option [ngValue]="0">0</option>
                <option [ngValue]="1">1</option>
                <option [ngValue]="2">2</option>
                <option [ngValue]="3">3</option>
                <option [ngValue]="4">4+</option>
            </select>
        </label>

        <label class="form-field">
            <span class="form-field__label">
                <img src="assets/images/rsvp-meal.png" alt="" class="field-icon" />
                Stravovací omezení
            </span>

            <textarea formControlName="dietaryRestrictions"
                placeholder="Např. bezlepková dieta, vegetarián, alergie..."></textarea>
        </label>

        <label class="form-field">
            <span class="form-field__label">
                <img src="assets/images/rsvp-note.png" alt="" class="field-icon" />
                Poznámka
            </span>

            <textarea formControlName="note" placeholder="Máte pro nás nějakou poznámku?"></textarea>
        </label>

<button class="submit-button" type="submit" [disabled]="rsvpForm.invalid">
  <span class="submit-icon" aria-hidden="true">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 21l19-9-19-9v7l13 2-13 2v7z" />
    </svg>
  </span>
  Odeslat odpověď
</button>
        <!--
        <p *ngIf="submitted" class="rsvp-success">
            Děkujeme, odpověď byla odeslána.
        </p>

        <p *ngIf="submitError" class="rsvp-error">
            {{ submitError }}
        </p>-->
    </form>

    <div class="flash-toast" *ngIf="flashMessageType">
        <div class="flash-toast__content" [class.flash-toast__content--success]="flashMessageType === 'success'"
            [class.flash-toast__content--error]="flashMessageType === 'error'">
            {{ flashMessage }}
        </div>
    </div>

</section>
